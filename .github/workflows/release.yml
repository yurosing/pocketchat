name: Build and release (public)

# Builds the client mod and the FREE server plugin edition only, then publishes
# a GitHub release. The Pro plugin edition (PocketChatPro) is never built or
# attached here — it lives only in the private build.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Pre-fetch Mod Menu into a local maven repo
        run: |
          # maven.terraformersmc.com is flaky (truncated jars, 502s/404s on the CDN),
          # so best-effort pre-fetch the jar into a local repo. If it fails, we clear
          # ci-maven and let Gradle resolve Mod Menu from the real terraformersmc repo
          # at build time — the prefetch never fails the whole release.
          dir=ci-maven/com/terraformersmc/modmenu/17.0.0-beta.2
          mkdir -p "$dir"
          if curl -fL --http1.1 -C - --retry 15 --retry-all-errors --retry-delay 2 \
              -o "$dir/modmenu-17.0.0-beta.2.jar" \
              https://maven.terraformersmc.com/releases/com/terraformersmc/modmenu/17.0.0-beta.2/modmenu-17.0.0-beta.2.jar; then
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<project xmlns="http://maven.apache.org/POM/4.0.0">' \
              '  <modelVersion>4.0.0</modelVersion>' \
              '  <groupId>com.terraformersmc</groupId>' \
              '  <artifactId>modmenu</artifactId>' \
              '  <version>17.0.0-beta.2</version>' \
              '  <packaging>jar</packaging>' \
              '</project>' > "$dir/modmenu-17.0.0-beta.2.pom"
          else
            echo "Mod Menu prefetch failed — clearing ci-maven, Gradle will fetch it directly."
            rm -rf ci-maven
          fi

      - name: Build mod
        run: ./gradlew build --stacktrace

      - name: Locate mod jar
        id: jar
        run: |
          jar=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"

      - name: Set up Gradle for the server plugin
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Build server plugin (free edition only)
        working-directory: server-plugin
        run: gradle build --no-daemon --stacktrace

      - name: Locate plugin jar
        id: plugin
        run: |
          free=$(find server-plugin/build/libs -maxdepth 1 -name 'PocketChat-*.jar' | head -n1)
          echo "free=$free" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pmchat-jars
          path: |
            ${{ steps.jar.outputs.path }}
            ${{ steps.plugin.outputs.free }}
          if-no-files-found: error

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
            echo "name=v$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.jar.outputs.path }}
            ${{ steps.plugin.outputs.free }}
