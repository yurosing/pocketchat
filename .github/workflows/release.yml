name: Build and release mod jar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Pre-fetch flaky dependencies
        run: |
          mkdir -p libs
          rm -f libs/modmenu-17.0.0-beta.2.jar
          curl -fL --http1.1 -C - --retry 15 --retry-all-errors --retry-delay 2 \
            -o libs/modmenu-17.0.0-beta.2.jar \
            https://maven.terraformersmc.com/releases/com/terraformersmc/modmenu/17.0.0-beta.2/modmenu-17.0.0-beta.2.jar

      - name: Build
        run: ./gradlew build --stacktrace

      - name: Locate jar
        id: jar
        run: |
          jar=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' | head -n1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar")" >> "$GITHUB_OUTPUT"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: ${{ steps.jar.outputs.path }}

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
            echo "name=v$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.jar.outputs.path }}
          generate_release_notes: true
